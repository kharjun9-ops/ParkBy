<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParkBy – Create Account</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%234f46e5'/%3E%3Cstop offset='100%25' stop-color='%237c3aed'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath fill='url(%23g)' d='M32 2C18.7 2 8 12.7 8 26c0 17.4 22 34.8 23 35.6.6.4 1.3.4 2 0 1-.8 23-18.2 23-35.6C56 12.7 45.3 2 32 2z'/%3E%3Ccircle fill='white' cx='32' cy='26' r='14'/%3E%3Cpath fill='%234f46e5' d='M28 18h8c3.3 0 6 2.7 6 6s-2.7 6-6 6h-4v4h-4V18zm4 8h4c1.1 0 2-.9 2-2s-.9-2-2-2h-4v4z'/%3E%3C/svg%3E">
</head>
<body>
  
  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <div class="login-container">
    <div class="card login-card">
      
      <!-- Header -->
      <div class="login-header">
        <div class="login-logo">
          <svg viewBox="0 0 64 64" width="50" height="50">
            <defs>
              <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="100%" stop-color="#e0e7ff"/>
              </linearGradient>
            </defs>
            <path fill="url(#logoGrad)" d="M32 4C19.8 4 10 13.8 10 26c0 16 20 32 21.2 33.1.5.4 1.1.4 1.6 0C34 58 54 42 54 26 54 13.8 44.2 4 32 4z"/>
            <path fill="#4f46e5" d="M26 16h10c4.4 0 8 3.6 8 8s-3.6 8-8 8h-6v6h-4V16zm4 12h6c2.2 0 4-1.8 4-4s-1.8-4-4-4h-6v8z"/>
          </svg>
        </div>
        <h1 class="login-title">Join ParkBy</h1>
        <p class="login-subtitle">Create your free account in seconds</p>
      </div>

      <!-- Signup Form -->
      <form class="login-form" onsubmit="signup(event)">
        <div class="input-group">
          <span class="input-icon">👤</span>
          <input 
            type="text" 
            id="name" 
            placeholder="Enter your full name" 
            required
            autocomplete="name"
          />
        </div>

        <div class="input-group">
          <span class="input-icon">📧</span>
          <input 
            type="email" 
            id="email" 
            placeholder="Enter your email" 
            required
            autocomplete="email"
          />
        </div>

        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input 
            type="password" 
            id="password" 
            placeholder="Create a password (min 6 chars)" 
            required
            minlength="6"
            autocomplete="new-password"
          />
        </div>

        <div class="input-group">
          <span class="input-icon">🔐</span>
          <input 
            type="password" 
            id="confirmPassword" 
            placeholder="Confirm your password" 
            required
            minlength="6"
            autocomplete="new-password"
          />
        </div>

        <button type="submit" class="btn btn-primary w-full" id="signupBtn">
          <span id="btnText">Create Account</span>
          <span id="btnSpinner" class="hidden">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" stroke-opacity="0.25"/>
              <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round">
                <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1s" repeatCount="indefinite"/>
              </path>
            </svg>
          </span>
        </button>
      </form>

      <!-- Message -->
      <div id="msg"></div>

      <!-- Footer -->
      <div class="login-footer">
        <p>Already have an account?</p>
        <a href="login.html" class="btn btn-secondary" style="margin-top: 12px; width: 100%;">
          Sign In Instead
        </a>
      </div>

    </div>
  </div>

  <!-- Floating Decorative Elements -->
  <div class="floating-shapes">
    <div class="shape shape-1">
      <svg viewBox="0 0 64 64" width="60" height="60">
        <path fill="rgba(255,255,255,0.08)" d="M32 2C18.7 2 8 12.7 8 26c0 17.4 22 34.8 23 35.6.6.4 1.3.4 2 0 1-.8 23-18.2 23-35.6C56 12.7 45.3 2 32 2z"/>
      </svg>
    </div>
    <div class="shape shape-2">
      <svg viewBox="0 0 64 64" width="80" height="80">
        <path fill="rgba(255,255,255,0.06)" d="M32 2C18.7 2 8 12.7 8 26c0 17.4 22 34.8 23 35.6.6.4 1.3.4 2 0 1-.8 23-18.2 23-35.6C56 12.7 45.3 2 32 2z"/>
      </svg>
    </div>
    <div class="shape shape-3">
      <svg viewBox="0 0 64 64" width="50" height="50">
        <path fill="rgba(255,255,255,0.05)" d="M32 2C18.7 2 8 12.7 8 26c0 17.4 22 34.8 23 35.6.6.4 1.3.4 2 0 1-.8 23-18.2 23-35.6C56 12.7 45.3 2 32 2z"/>
      </svg>
    </div>
    <div class="shape shape-4">
      <svg viewBox="0 0 64 64" width="45" height="45">
        <path fill="rgba(255,255,255,0.07)" d="M32 2C18.7 2 8 12.7 8 26c0 17.4 22 34.8 23 35.6.6.4 1.3.4 2 0 1-.8 23-18.2 23-35.6C56 12.7 45.3 2 32 2z"/>
      </svg>
    </div>
  </div>

  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }
    
    .floating-shapes {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    
    .shape {
      position: absolute;
      animation: float 8s ease-in-out infinite;
    }
    
    .shape-1 { top: 10%; left: 5%; animation-delay: 0s; }
    .shape-2 { bottom: 15%; right: 8%; animation-delay: 2s; animation-direction: reverse; }
    .shape-3 { top: 60%; left: 8%; animation-delay: 4s; }
    .shape-4 { top: 20%; right: 12%; animation-delay: 1s; animation-direction: reverse; }
  </style>

  <script src="signup.js"></script>
</body>
</html>
